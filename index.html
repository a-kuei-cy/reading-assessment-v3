<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>閱讀素養數位評量 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --ink:#1a1a2e;--ink-soft:#3d3d5c;--ink-light:#6b7280;
  --paper:#faf9f6;--paper-warm:#f5f0e8;
  --accent:#4f46e5;--accent-soft:rgba(79,70,229,.08);
  --green:#059669;--green-soft:rgba(5,150,105,.12);
  --orange:#d97706;--orange-soft:rgba(217,119,6,.12);
  --border:rgba(26,26,46,.1);
  --shadow-md:0 8px 32px rgba(26,26,46,.10);
  --shadow-sm:0 2px 8px rgba(26,26,46,.06);
  --r:16px;--rs:10px;--tr:.2s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;line-height:1.7}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(circle at 20% 20%,rgba(79,70,229,.04) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(217,119,6,.04) 0%,transparent 50%);pointer-events:none}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:100;background:rgba(250,249,246,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 16px}
.hdr-in{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:8px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;min-width:0;flex:1}
.logo-icon{font-size:24px;flex-shrink:0}
.logo-t{font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo-s{font-size:10px;color:var(--ink-light);letter-spacing:.04em;display:none}
.hnav{display:flex;gap:6px;align-items:center;flex-shrink:0}
.nl{padding:6px 12px;border-radius:999px;font-size:13px;color:var(--ink-soft);transition:var(--tr);font-weight:600;cursor:pointer;border:none;background:none;font-family:inherit;white-space:nowrap}
.nl:hover{background:var(--accent-soft);color:var(--accent)}
.nl.rank{background:var(--accent);color:#fff;padding:7px 14px}
.nl.admin{background:var(--ink);color:#fff;padding:7px 14px}

/* ── Layout ── */
.main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:20px 16px 80px}
.page{display:none}
.page.active{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── Card ── */
.card{background:#fff;border-radius:var(--r);padding:28px 24px;box-shadow:var(--shadow-md);border:1px solid var(--border)}
.card-center{max-width:540px;margin:0 auto;text-align:center}
.badge{display:inline-block;padding:4px 14px;background:var(--accent-soft);color:var(--accent);border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.05em;margin-bottom:16px}
.card-title{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:900;margin-bottom:10px;line-height:1.3}
.card-desc{color:var(--ink-light);font-size:14px;margin-bottom:20px}
.tags{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.tag{padding:4px 12px;border-radius:999px;font-size:12px;font-weight:500}
.tag-b{background:rgba(79,70,229,.1);color:var(--accent)}
.tag-g{background:var(--green-soft);color:var(--green)}
.tag-o{background:var(--orange-soft);color:var(--orange)}

/* ── Form ── */
.fg{text-align:left;margin-bottom:14px}
.fg label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:15px;color:var(--ink);background:var(--paper);transition:var(--tr);outline:none;-webkit-appearance:none;appearance:none}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.1);background:#fff}
.inp-sm{width:auto;padding:7px 10px;font-size:13px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 22px;border-radius:999px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;transition:var(--tr);border:none;outline:none;-webkit-tap-highlight-color:transparent}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(79,70,229,.25)}
.btn-p:active{transform:scale(.97)}
.btn-s{background:var(--ink);color:#fff}
.btn-o{background:transparent;color:var(--accent);border:2px solid var(--accent)}
.btn-o:active{background:var(--accent-soft)}
.btn-full{width:100%;padding:14px;font-size:16px;margin-top:10px}
.btn-sub{width:100%;margin-top:20px;padding:14px;font-size:16px}

/* ── Loading ── */
.loading-box{text-align:center;padding:60px 24px}
.spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:var(--ink-light);font-size:15px}

/* ── Quiz ── */
.quiz-wrap{display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start}
.pass-panel,.q-panel{background:#fff;border-radius:var(--r);padding:24px;box-shadow:var(--shadow-md);border:1px solid var(--border)}
.pass-panel{position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto}
.panel-lbl{font-size:11px;font-weight:700;color:var(--ink-light);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.pass-meta{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
.mbadge{padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600}
.mb-acc{background:var(--accent-soft);color:var(--accent)}
.mb-grn{background:var(--green-soft);color:var(--green)}
.mb-org{background:var(--orange-soft);color:var(--orange)}

/* ── Progress ── */
.prog{margin-bottom:20px}
.prog-lbl{font-size:12px;font-weight:600;color:var(--ink-light);margin-bottom:6px;display:flex;justify-content:space-between}
.prog-bar{background:var(--paper-warm);border-radius:999px;height:8px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .4s ease;width:0}

/* ── Question ── */
.qb{margin-bottom:24px;padding-bottom:20px;border-bottom:1px dashed var(--border)}
.qb:last-child{border-bottom:none;padding-bottom:0}
.qt{font-weight:600;font-size:15px;margin-bottom:10px;line-height:1.65}
.qt .qnum{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--accent);color:#fff;border-radius:50%;font-size:11px;margin-right:6px;flex-shrink:0;vertical-align:middle}
.opts{display:grid;gap:8px}
.opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--rs);border:1.5px solid var(--border);cursor:pointer;transition:var(--tr);user-select:none;-webkit-tap-highlight-color:transparent;min-height:44px}
.opt:hover{border-color:rgba(79,70,229,.4);background:var(--accent-soft)}
.opt.sel{border-color:var(--accent);background:var(--accent-soft)}
.opt input{display:none}
.opt-l{display:flex;align-items:center;justify-content:center;width:28px;height:28px;min-width:28px;border-radius:50%;background:var(--paper-warm);font-size:12px;font-weight:700;color:var(--ink-soft);transition:var(--tr);flex-shrink:0}
.opt.sel .opt-l{background:var(--accent);color:#fff}
.opt-t{font-size:14px;color:var(--ink-soft);line-height:1.55;flex:1}

/* ── Result ── */
.res-wrap{max-width:680px;margin:0 auto}
.res-hdr{text-align:center;margin-bottom:28px}
.res-emoji{font-size:56px;margin-bottom:12px}
.res-title{font-family:'Noto Serif TC',serif;font-size:24px;font-weight:900;margin-bottom:6px}
.res-desc{color:var(--ink-light);font-size:15px}
.res-cards{display:grid;grid-template-columns:140px 1fr;gap:16px;margin-bottom:20px}
.score-card{background:var(--accent);color:#fff;border-radius:var(--r);padding:24px 16px;text-align:center;box-shadow:0 8px 24px rgba(79,70,229,.3)}
.score-n{font-family:'Noto Serif TC',serif;font-size:42px;font-weight:900;line-height:1}
.score-l{font-size:12px;opacity:.8;margin-top:4px}
.skill-card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;gap:12px}
.si{display:flex;align-items:center;gap:8px}
.si-n{font-size:12px;font-weight:600;color:var(--ink-soft);width:62px;flex-shrink:0}
.si-bw{flex:1;height:8px;background:var(--paper-warm);border-radius:999px;overflow:hidden}
.si-b{height:100%;border-radius:999px;width:0;transition:width .8s ease}
.b-acc{background:var(--accent)}
.b-grn{background:var(--green)}
.b-org{background:var(--orange)}
.si-v{font-size:12px;font-weight:700;width:32px;text-align:right;color:var(--ink-soft)}
.chart-box{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border);display:flex;justify-content:center;margin-bottom:16px;overflow:hidden}
.fb-tip{background:var(--orange-soft);border:1px solid rgba(217,119,6,.2);border-radius:var(--rs);padding:12px 16px;font-size:14px;color:var(--ink-soft);margin-bottom:16px}
.res-acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.res-acts .btn{flex:1;min-width:120px;max-width:200px}

/* ── Rank ── */
.rank-wrap{max-width:760px;margin:0 auto}
.rank-filter{display:flex;align-items:center;gap:10px;margin-bottom:20px;font-size:14px;font-weight:600;color:var(--ink-soft);flex-wrap:wrap}
.rank-note{font-size:11px;color:var(--ink-light);font-weight:400}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:24px}
.pod{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:14px;background:#fff;border-radius:var(--r) var(--r) 0 0;flex:1;max-width:160px;min-width:90px;box-shadow:var(--shadow-md);border:1px solid var(--border);border-bottom:none}
.pod-m{font-size:28px;margin-bottom:4px}
.pod-name{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;text-align:center;padding:0 6px;word-break:break-all}
.pod-cls{font-size:11px;color:var(--ink-light);margin-bottom:4px}
.pod-s{font-size:18px;font-weight:900;color:var(--accent)}
.pod-p{font-size:12px;color:var(--ink-light);padding-bottom:10px}
.rank-card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--shadow-md);border:1px solid var(--border);margin-bottom:20px}
.rank-card h3{font-size:14px;font-weight:700;margin-bottom:12px}
.rrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.rrow:last-child{border-bottom:none}
.rrow.top{background:linear-gradient(to right,var(--accent-soft),transparent);border-radius:var(--rs);padding:9px 8px}
.r-num{width:26px;text-align:center;font-weight:700;font-size:14px;flex-shrink:0}
.r-name{font-weight:600;min-width:0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r-cls{color:var(--ink-light);font-size:11px;min-width:60px;flex-shrink:0}
.r-bw{flex:2;height:6px;background:var(--paper-warm);border-radius:999px;overflow:hidden;min-width:40px}
.r-b{height:100%;background:var(--accent);border-radius:999px}
.r-score{font-weight:700;width:32px;text-align:right;font-size:12px;flex-shrink:0}
.r-pct{font-size:12px;color:var(--accent);font-weight:700;width:32px;text-align:right;flex-shrink:0}
.rank-back{margin-bottom:16px}
.rank-cta{text-align:center;margin-top:4px}

/* ── Footer ── */
.ftr{position:relative;z-index:1;text-align:center;padding:20px 16px;font-size:11px;color:var(--ink-light);border-top:1px solid var(--border)}

/* ════════════════════════════════
   Responsive Breakpoints
════════════════════════════════ */

/* Tablet 768px */
@media(min-width:769px){
  .hdr{padding:0 24px}
  .hdr-in{height:64px}
  .logo-t{font-size:18px}
  .logo-s{display:block}
  .nl{padding:7px 16px;font-size:14px}
  .main{padding:32px 24px 80px}
  .card{padding:36px 32px}
  .card-title{font-size:30px}
  .quiz-wrap{grid-template-columns:260px 1fr}
}

/* Desktop 1024px */
@media(min-width:1025px){
  .quiz-wrap{grid-template-columns:300px 1fr;gap:24px}
  .pass-panel{padding:28px}
  .q-panel{padding:28px}
}

/* Mobile only overrides ≤768px */
@media(max-width:768px){
  .quiz-wrap{grid-template-columns:1fr}
  .pass-panel{position:static;max-height:none;margin-bottom:16px}
  .res-cards{grid-template-columns:1fr}
  .score-card{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px 20px;border-radius:var(--rs)}
  .score-n{font-size:36px}
  .chart-box canvas{width:100%!important;max-width:260px;height:auto!important}
  .podium{gap:6px}
  .pod{min-width:80px}
  .rrow{gap:6px}
  .r-cls{display:none}
  .r-bw{min-width:30px}
}

/* Small mobile ≤480px */

/* ── Passage (閱讀文章) ── */
.quiz-wrap-passage{grid-template-columns:1fr 1fr}
.passage-panel{background:#fff;border-radius:var(--r);padding:24px;box-shadow:var(--shadow-md);border:1px solid var(--border);position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto}
.passage-lbl{font-size:11px;font-weight:700;color:var(--ink-light);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.passage-body{font-size:15px;line-height:2;color:var(--ink-soft);white-space:pre-wrap;word-break:break-word}
.passage-divider{height:1px;background:var(--border);margin:16px 0}
@media(max-width:768px){
  .quiz-wrap-passage{grid-template-columns:1fr}
  .passage-panel{position:static;max-height:none;margin-bottom:0}
}
@media(max-width:480px){
  .passage-body{font-size:14px;line-height:1.9}
}
@media(max-width:480px){
  .hdr-in{height:52px}
  .logo-icon{font-size:22px}
  .logo-t{font-size:14px}
  .nl.rank{padding:6px 10px;font-size:12px}
  .nl.admin{padding:6px 10px;font-size:12px}
  .main{padding:16px 12px 60px}
  .card{padding:20px 16px;border-radius:12px}
  .card-title{font-size:22px}
  .badge{font-size:10px}
  .tags{gap:4px}
  .tag{font-size:11px;padding:3px 10px}
  .btn{padding:11px 18px;font-size:14px}
  .btn-full,.btn-sub{font-size:15px;padding:13px}
  .inp{font-size:16px}/* prevent iOS zoom */
  .qb{margin-bottom:20px;padding-bottom:16px}
  .qt{font-size:14px}
  .opt{padding:10px 12px}
  .opt-t{font-size:13px}
  .res-emoji{font-size:44px}
  .res-title{font-size:20px}
  .res-acts .btn{font-size:14px;padding:11px 16px}
  .rank-filter{gap:6px}
  .rank-filter .inp-sm{font-size:13px;padding:6px 8px}
  .pod-m{font-size:22px}
  .pod-name{font-size:12px}
  .pod-s{font-size:15px}
  .rrow{font-size:12px}
  .r-bw{display:none}
  .rank-card{padding:16px}
}
</style>
</head>
<body>
<div class="bg"></div>
<header class="hdr">
  <div class="hdr-in">
    <div class="logo" onclick="goHome()">
      <span class="logo-icon">📚</span>
      <div>
        <div class="logo-t">閱讀素養數位評量</div>
        <div class="logo-s">Digital Reading Assessment 2.0</div>
      </div>
    </div>
    <nav class="hnav">
      <button class="nl rank" onclick="gotoRank()">🏆 排行榜</button>
      <button class="nl admin" onclick="window.location.href='admin.html'">教師入口</button>
    </nav>
  </div>
</header>

<main class="main">

  <!-- ══ 首頁 ══ -->
  <div id="pageHome" class="page active">
    <div class="card card-center">
      <div class="badge">PIRLS · ePIRLS · PISA 對齊框架</div>
      <h1 class="card-title">開始評量</h1>
      <p class="card-desc">每次從題庫隨機抽取 10 題，選項順序也會隨機排列。</p>
      <div class="tags">
        <span class="tag tag-b">📥 擷取理解</span>
        <span class="tag tag-g">🔗 推論統整</span>
        <span class="tag tag-o">💡 評鑑反思</span>
      </div>
      <div class="fg"><label>班級</label><input id="className" class="inp" placeholder="例：五年三班"></div>
      <div class="fg"><label>姓名</label><input id="stuName" class="inp" placeholder="請輸入姓名"></div>
      <div class="fg">
        <label>年級</label>
        <select id="quizLevel" class="inp">
          <option value="all">不限（全部隨機）</option>
          <option value="中年級">中年級（3–4年級）</option>
          <option value="高年級">高年級（5–6年級）</option>
        </select>
      </div>
      <button onclick="startQuiz()" class="btn btn-p btn-full">開始測驗 →</button>
      <div id="homeErr" style="color:#dc2626;font-size:13px;margin-top:12px;min-height:18px"></div>
    </div>
  </div>

  <!-- ══ 載入中 ══ -->
  <div id="pageLoading" class="page">
    <div class="loading-box">
      <div class="spinner"></div>
      <div class="loading-txt">正在從題庫載入題目…</div>
    </div>
  </div>

  <!-- ══ 作答 ══ -->
  <div id="pageQuiz" class="page">
    <!-- 有文章版：passage-panel + q-panel -->
    <div id="quizWrapPassage" class="quiz-wrap quiz-wrap-passage" style="display:none">
      <div class="passage-panel">
        <div class="passage-lbl">📄 <span id="passageTitle">閱讀文章</span></div>
        <div id="passageBody" class="passage-body"></div>
        <div class="passage-divider"></div>
        <div class="panel-lbl" style="margin-top:0">📋 測驗資訊</div>
        <div id="quizInfo2" style="font-size:13px;color:var(--ink-soft);line-height:1.9"></div>
        <div class="pass-meta" id="quizMeta2"></div>
      </div>
      <div class="q-panel">
        <div class="prog">
          <div class="prog-lbl"><span>答題進度</span><span id="progTxt2">0 / 10</span></div>
          <div class="prog-bar"><div id="progFill2" class="prog-fill"></div></div>
        </div>
        <div id="qArea2"></div>
        <button onclick="submitQuiz()" class="btn btn-p btn-sub">送出答案 ✓</button>
      </div>
    </div>
    <!-- 純題目版：info panel + q-panel -->
    <div id="quizWrapPlain" class="quiz-wrap" style="display:none">
      <div class="pass-panel">
        <div class="panel-lbl">📋 本次測驗資訊</div>
        <div id="quizInfo" style="font-size:14px;color:var(--ink-soft);line-height:2"></div>
        <div class="pass-meta" id="quizMeta"></div>
      </div>
      <div class="q-panel">
        <div class="prog">
          <div class="prog-lbl"><span>答題進度</span><span id="progTxt">0 / 10</span></div>
          <div class="prog-bar"><div id="progFill" class="prog-fill"></div></div>
        </div>
        <div id="qArea"></div>
        <button onclick="submitQuiz()" class="btn btn-p btn-sub">送出答案 ✓</button>
      </div>
    </div>
  </div>

  <!-- ══ 結果 ══ -->
  <div id="pageResult" class="page">
    <div class="res-wrap">
      <div class="res-hdr">
        <div id="resEmoji" class="res-emoji">🎉</div>
        <h2 id="resTitle" class="res-title"></h2>
        <p  id="resDesc"  class="res-desc"></p>
      </div>
      <div class="res-cards">
        <div class="score-card">
          <div id="totalScore" class="score-n">0/10</div>
          <div class="score-l">本次得分</div>
        </div>
        <div class="skill-card">
          <div class="si"><div class="si-n">📥 擷取</div><div class="si-bw"><div id="bar-r" class="si-b b-acc"></div></div><div id="val-r" class="si-v"></div></div>
          <div class="si"><div class="si-n">🔗 推論</div><div class="si-bw"><div id="bar-i" class="si-b b-grn"></div></div><div id="val-i" class="si-v"></div></div>

<script>
// ── 設定 ──────────────────────────────────────────────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1a6flhMRxgv6dLt4nQeXRr1KlfMVa3ihGE26hzryzMGlPettBa98Jecefbs3onXP8/exec";   // ← 必填
const RANK_KEY   = "readingRank_v2";
const BANK_KEY   = "readingBank_v2";
const BANK_TTL   = 10 * 60 * 1000;   // 題庫快取 10 分鐘

// ── i18n 回饋 ─────────────────────────────────────────────────
const FB = {
  excellent:{emoji:"🌟",title:"卓越表現！",desc:"閱讀素養達到優秀水準，三項能力均衡發展。"},
  good:     {emoji:"👍",title:"表現良好！",desc:"整體能力不錯，持續練習可以更進步。"},
  average:  {emoji:"📖",title:"繼續加油！",desc:"多閱讀不同類型文章，能力會逐漸提升。"},
  low:      {emoji:"💪",title:"勇敢嘗試！",desc:"每次練習都是成長，下次一定會更好！"}
};

// ── State ─────────────────────────────────────────────────────
let currentQs = [], studentData = {}, radarChart, rankData = [];

// ── 工具 ──────────────────────────────────────────────────────
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function showPage(id){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo({top:0,behavior:'smooth'}); }
function goHome(){ showPage('pageHome'); }
function gotoRank(){ showPage('pageRank'); loadRank(); }

// ── 題庫載入（含快取） ────────────────────────────────────────
async function fetchBank() {
  // 先嘗試快取
  try {
    const c = JSON.parse(localStorage.getItem(BANK_KEY)||'null');
    if (c && Date.now() - c.ts < BANK_TTL && c.data.length > 0) return c.data;
  } catch(e){}

  if (SCRIPT_URL === "貼上你的Apps Script網址") return getDefaultBank();

  try {
    const res  = await fetch(SCRIPT_URL + "?action=bank");
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      localStorage.setItem(BANK_KEY, JSON.stringify({ts: Date.now(), data}));
      return data;
    }
  } catch(e){}
  return getDefaultBank();
}

// ── 開始測驗 ──────────────────────────────────────────────────
async function startQuiz() {
  const cn = document.getElementById('className').value.trim();
  const nm = document.getElementById('stuName').value.trim();
  const lv = document.getElementById('quizLevel').value;
  const errEl = document.getElementById('homeErr');

  if (!cn || !nm) { errEl.textContent = '請填寫班級和姓名！'; return; }
  errEl.textContent = '';
  studentData = { className: cn, name: nm };

  showPage('pageLoading');

  const bank = await fetchBank();
  const pool = lv === 'all' ? bank : bank.filter(q => q.level === lv);

  if (pool.length === 0) {
    showPage('pageHome');
    errEl.textContent = '目前該年級尚無題目，請告知教師新增。';
    return;
  }

  // 隨機抽 10 題（不重複），並洗牌選項
  const picked = shuffle(pool).slice(0, Math.min(10, pool.length));
  currentQs = picked.map(item => {
    const idxMap = shuffle([0,1,2,3]);
    return {
      ...item,
      options: idxMap.map(i => item.options[i]),
      answer:  idxMap.indexOf(item.answer)
    };
  });

  renderQuiz();
  showPage('pageQuiz');
}

function renderQuiz() {
  const levels = [...new Set(currentQs.map(q=>q.level))].join('、');
  const cats   = [...new Set(currentQs.map(q=>q.category))].join('、');
  const infoHtml = `年級：${levels}<br>文體：${cats}<br>題數：${currentQs.length} 題`;
  const metaHtml = [...new Set(currentQs.map(q=>q.skill))].map(s=>{
    const cls = s==='擷取'?'mb-acc':s==='推論'?'mb-grn':'mb-org';
    return `<span class="mbadge ${cls}">${s}</span>`;
  }).join('');

  // 判斷是否有文章（取第一題的 passage 代表整組）
  const passage = currentQs[0]?.passage || '';
  const hasPassage = passage.trim().length > 0;

  // 切換顯示哪個 wrap
  document.getElementById('quizWrapPassage').style.display = hasPassage ? '' : 'none';
  document.getElementById('quizWrapPlain').style.display   = hasPassage ? 'none' : '';

  if (hasPassage) {
    // ── 有文章版 ──
    const cat = currentQs[0]?.category || '閱讀文章';
    document.getElementById('passageTitle').textContent = `${cat}`;
    document.getElementById('passageBody').textContent  = passage;
    document.getElementById('quizInfo2').innerHTML = infoHtml;
    document.getElementById('quizMeta2').innerHTML = metaHtml;
    document.getElementById('progFill2').style.width = '0%';
    document.getElementById('progTxt2').textContent  = `0 / ${currentQs.length}`;
    document.getElementById('qArea2').innerHTML = buildQHtml(currentQs);
  } else {
    // ── 純題目版 ──
    document.getElementById('quizInfo').innerHTML = infoHtml;
    document.getElementById('quizMeta').innerHTML = metaHtml;
    document.getElementById('progFill').style.width = '0%';
    document.getElementById('progTxt').textContent  = `0 / ${currentQs.length}`;
    document.getElementById('qArea').innerHTML = buildQHtml(currentQs);
  }
}

function buildQHtml(qs) {
  let html = '';
  qs.forEach((item,i) => {
    html += `<div class="qb">
      <div class="qt"><span class="qnum">${i+1}</span>${item.q}</div>
      <div class="opts">`;
    item.options.forEach((opt,j) => {
      html += `<label class="opt" id="op${i}_${j}">
        <input type="radio" name="q${i}" value="${j}" onchange="onOpt(${i})">
        <span class="opt-l">${'ABCD'[j]}</span>
        <span class="opt-t">${opt}</span>
      </label>`;
    });
    html += `</div></div>`;
  });
  return html;
}

function onOpt(qi) {
  currentQs[qi].options.forEach((_,j) => document.getElementById(`op${qi}_${j}`)?.classList.remove('sel'));
  const s = document.querySelector(`input[name=q${qi}]:checked`);
  if (s) document.getElementById(`op${qi}_${parseInt(s.value)}`)?.classList.add('sel');
  let ans = 0;
  currentQs.forEach((_,i) => { if(document.querySelector(`input[name=q${i}]:checked`)) ans++; });
  const pct = (ans/currentQs.length*100) + '%';
  const txt = `${ans} / ${currentQs.length}`;
  // 更新兩個版面的進度條（只有一個會顯示）
  ['progFill','progFill2'].forEach(id => { const el=document.getElementById(id); if(el) el.style.width=pct; });
  ['progTxt','progTxt2'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=txt; });
}

// ── 送出 ──────────────────────────────────────────────────────
function submitQuiz() {
  const un = [];
  currentQs.forEach((_,i) => { if(!document.querySelector(`input[name=q${i}]:checked`)) un.push(i+1); });
  if (un.length) { alert(`請完成第 ${un.join('、')} 題再送出！`); return; }

  let score = 0;
  const ss = {'擷取':0,'推論':0,'評鑑':0}, st = {'擷取':0,'推論':0,'評鑑':0};
  currentQs.forEach((item,i) => {
    st[item.skill]++;
    const v = document.querySelector(`input[name=q${i}]:checked`);
    if (v && parseInt(v.value) === item.answer) { score++; ss[item.skill]++; }
  });

  const tot = currentQs.length, pct = score/tot;
  const fb  = pct>=.8?FB.excellent:pct>=.6?FB.good:pct>=.4?FB.average:FB.low;
  document.getElementById('resEmoji').textContent = fb.emoji;
  document.getElementById('resTitle').textContent = fb.title;
  document.getElementById('resDesc').textContent  = fb.desc;
  document.getElementById('totalScore').textContent = `${score}/${tot}`;

  [['擷取','r'],['推論','i'],['評鑑','e']].forEach(([k,id]) => {
    const p = st[k]>0 ? ss[k]/st[k]*100 : 0;
    document.getElementById(`bar-${id}`).style.width = p+'%';
    document.getElementById(`val-${id}`).textContent = `${ss[k]}/${st[k]}`;
  });

  const weak = ['擷取','推論','評鑑'].filter(k=>st[k]>0&&ss[k]/st[k]<.5);
  document.getElementById('fbArea').innerHTML = weak.length
    ? `<div class="fb-tip">💡 建議加強：<strong>${weak.join('、')}</strong> 能力，可多閱讀不同類型文章練習。</div>` : '';

  if (radarChart) radarChart.destroy();
  radarChart = new Chart(document.getElementById('radarChart'), {
    type:'radar',
    data:{ labels:['擷取理解','推論統整','評鑑反思'],
      datasets:[{ data:['擷取','推論','評鑑'].map(k=>st[k]>0?Math.round(ss[k]/st[k]*100):0),
        backgroundColor:'rgba(99,102,241,.2)',borderColor:'rgba(99,102,241,.8)',
        borderWidth:2,pointBackgroundColor:'rgba(99,102,241,1)',pointRadius:5 }]},
    options:{ responsive:false, scales:{r:{min:0,max:100,ticks:{stepSize:25,font:{size:10}},pointLabels:{font:{size:12}}}},
      plugins:{legend:{display:false}} }
  });

  // 儲存本機
  const entry = { date:new Date().toISOString(), ...studentData, score, total:tot,
    retrieve:ss['擷取'], infer:ss['推論'], evaluate:ss['評鑑'] };
  try { const a=JSON.parse(localStorage.getItem(RANK_KEY)||'[]'); a.push(entry); localStorage.setItem(RANK_KEY,JSON.stringify(a)); } catch(e){}

  // 送到 Apps Script
  if (SCRIPT_URL !== "貼上你的Apps Script網址") {
    fetch(SCRIPT_URL, { method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({action:'score', ...entry}) }).catch(()=>{});
  }
  showPage('pageResult');
}

// ── 排行榜 ────────────────────────────────────────────────────
function loadRank() {
  let local = [];
  try { local = JSON.parse(localStorage.getItem(RANK_KEY)||'[]'); } catch(e){}
  rankData = local;

  if (SCRIPT_URL !== "貼上你的Apps Script網址") {
    fetch(SCRIPT_URL + "?action=scores")
      .then(r=>r.json())
      .then(rows => {
        if (Array.isArray(rows) && rows.length > 1) {
          rankData = rows.slice(1).map(r=>({
            date:r[0], className:r[1], name:r[2],
            score:+r[3], total:+r[4]||10
          }));
        }
        initRankFilters();
      }).catch(() => initRankFilters());
  } else {
    if (!rankData.length) rankData = demoRank();
    initRankFilters();
  }
}

function demoRank() {
  const cls=['五年一班','五年二班','五年三班','六年一班'];
  const nms=['王小明','林雅婷','陳志豪','張美玲','李建宏','吳淑芬','劉家豪','許雅君','蔡宗翰','黃欣怡'];
  return nms.map((n,i)=>({name:n,className:cls[i%4],score:Math.floor(Math.random()*4)+6,total:10,date:new Date(Date.now()-i*3600000*8).toISOString()}));
}

function initRankFilters() {
  const classes=[...new Set(rankData.map(d=>d.className))].sort();
  const sel=document.getElementById('rankCls');
  sel.innerHTML='<option value="all">全部</option>';
  classes.forEach(c=>sel.innerHTML+=`<option value="${c}">${c}</option>`);
  renderRank();
}

function renderRank() {
  const cls = document.getElementById('rankCls').value;
  let f = cls==='all' ? [...rankData] : rankData.filter(d=>d.className===cls);
  f.sort((a,b)=>b.score/b.total - a.score/a.total || new Date(a.date)-new Date(b.date));

  const medals = ['🥇','🥈','🥉'], top3 = f.slice(0,3);
  const order  = top3.length>=3 ? [top3[1],top3[0],top3[2]] : top3;
  const heights= [140,185,115];

  document.getElementById('podiumArea').innerHTML = top3.length
    ? order.map((d,i)=>{ const ri=top3.indexOf(d); const h=top3.length>=3?heights[i]:160;
        return `<div class="pod" style="height:${h}px"><div class="pod-m">${medals[ri]||'🎖️'}</div>
        <div class="pod-name">${d.name}</div><div class="pod-cls">${d.className}</div>
        <div class="pod-s">${d.score}/${d.total}</div><div class="pod-p">${Math.round(d.score/d.total*100)}%</div></div>`;
      }).join('')
    : '<p style="text-align:center;color:#999;padding:20px;width:100%">暫無資料</p>';

  document.getElementById('rankList').innerHTML = f.length
    ? f.map((d,i)=>{ const pct=Math.round(d.score/d.total*100);
        return `<div class="rrow ${i<3?'top':''}"><span class="r-num">${i<3?medals[i]:i+1}</span>
        <span class="r-name">${d.name}</span><span class="r-cls">${d.className}</span>
        <div class="r-bw"><div class="r-b" style="width:${pct}%"></div></div>
        <span class="r-score">${d.score}/${d.total}</span><span class="r-pct">${pct}%</span></div>`;
      }).join('')
    : '<p style="text-align:center;color:#999;padding:24px">暫無資料</p>';
}
